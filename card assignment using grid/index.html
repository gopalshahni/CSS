<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Winky+Rough:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <style>
        body{
            background-color: #000000;
            font-family: Fraunces;
            color: white;
            display: grid;
            justify-content: center;
            align-items: center;
        }
        h1{
            font-size: 128px;
            font-weight: 400;
            text-align: center;
            margin: 0;
        }
        img{
            width: 100%;
            border-radius: 15px;
            padding: 0;
            margin: 0;
        }
        .container{
            display: grid;
            background-color: #7A7A7A;
            margin-left: 40px;
            height: 500px;
            width: 500px;
            border-radius: 20px;
            
        }
        .box2{
            margin-left: 10px;   
            height: 100px;      
        }

        h2{
            font-family: Fraunces;
            font-weight: 200px;
            padding: 0;
            margin-bottom: 10px;
        }
        .box3{
            display: grid;
           grid-template-columns: 0.5fr 0.5fr;
           align-items: center;
           gap: 10em;
           padding: 5px;
           border-radius: 0px 0px 15px 15px;
            margin-bottom: 20px;
        }
        button{
            border: none;
            height: 30px;
            width: 120px;
            border-radius: 5px;
            font-family: Fraunces;
            background-color: #D9D9D9;
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <h1>P O R C H E</h1>
    <div class="container">
        <div class="box1"><img src="car.png" alt=""></div>
        <div class="box2">
            <h2>Porche 911  Turbo </h2>
            <h2>Price 1 million $</h2>
        </div>
        <div class="box3">
            <button>BUY $</button>
            <button>ADD TO CART</button>
        </div>
    </div>
</body>
</html>
