<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Winky+Rough:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<style>
    body , html{
        background-color : #000000;
        color: white;
        font-family: Fraunces;
        margin: 0;
        padding: 0;
        display: grid;
        justify-content: center;
        align-items: center;
    }
    
    h1{
        font-size: 128px;
        font-weight: 400;
        padding-bottom: 30px;
        margin: 20px;
        margin-top: 30%;
    }
    .container{
        display: flex;
        margin-left: 8%;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        height: 420px;
        width: 500px;
        background-color: #7A7A7A;
        padding: 0px 20px 0px 20px;
        flex-wrap: wrap;
        border-radius: 5px;
    }
    img{
        width: 100%;
        border-radius: 5px;
        
    }
    .box1{
        padding: 5px;
        object-fit: cover;
    }
    .box2{
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        margin-left: 10px;
    }
    .box3{
        width: 100%;
        display: flex;
        justify-content: space-between;
    }
    button{
        margin: 5px;
        text-align: center;
        font-family: Fraunces;
        border: none;
        border-radius: 10px;
        background-color: #D9D9D9;
        width: 140px;
        font-size: 18px;
        padding: 6px;

    }
</style>
<body>
    <h1>P O R C H E</h1>
    <div class="container">
        <div class="box1"><img  src="car.png" alt=""></div>
        <div class="box2 description"><span>Porche 911 Turbo</span> Price 1 million $ <span></span></div>
        <div class=" box3 buttons"> <button>BUY $</button><button>ADD TO CART</button></div>
    </div>
</body>
</html>
