<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbars</title>
    <style>
        body{
            margin: 0;
            background-color: #000;
            color: #ffffff;
            padding: 20px;
        }

        h2{
            margin: 10px;
        }
        .navbar-container{
            margin-bottom: 10px;
            
        }

        .nav1{
            border: 2px solid red;
           background-color: #f9c6cf;
        }

        .nav1 ul {
            list-style-type: none;
            display: flex;
            justify-content: space-evenly;
        }
        .nav1 li {
            display: inline;
            background-color: #b570e9;
            padding: 2px;
            border-radius: 5px;
        }
        .nav1 a {
            text-decoration: none;
            color: white; 
            padding: 5px 15px;
            position: relative;
        }

        .nav1 a::after{
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out ;
        }

        .nav1 a:hover::after{
            background-color: white;
            transform: scaleX(1);
        }
        /* navba 2 starts from here  */
        .nav2 {
            border: 2px solid red;
            background-color: greenyellow;
            text-align: center;
            width: 200px;
            padding: 20px;
        }
        .nav2 ul{
            list-style-type: none;
            padding: 0px;
            margin: 0px;
        }
        .nav2 li{
            width: 100%;
            display: block;
        }
        .nav2 a {
            color: black;
            text-decoration: none;
            display: block;
            padding: 10px;
            width: 100%;
        }
        .nav2 a:hover{
            background-color: darkgreen;
            color: white;
        }
        .nav2 button {
            background-color: blue;
            color: white;
            border: none;
            width: 100%;
            padding: 5px;
        }
        .nav2 button:hover{
            background-color: #95dbf9;
            color: blue;
        }

        .nav3{
            border: 2px solid red;
            background-color: #95dbf9;
            padding: 10px;
        }

        .nav3 ul{
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav3 a{
            display: block;
            text-decoration: none;
            color: rgb(0, 0, 0);
            font-family: Arial, Helvetica, sans-serif;
        }
        .nav3 .dropdown-content{
            display: none;
        }
       
        .nav3 .dropdown:hover .dropdown-content{
            display: block;
            position:absolute;
            background-color: #95dbf9;
            min-height: 60px;
            margin-top: 8px;
        }

        button{
            background-color: #8a20da;
            width: 100px;
            text-align: center;
            color: white;
        }


    </style>
</head>
<body>
    <div class="navbar-container">
     <h2>Variaton 1 : Horizontal with Underline effect</h2>
     <div class="nav1">
         <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">Login</a></li>
        </ul>
    </div>
    </div>
    <div class="navbar-container">
    <h2>Variaton 2 : Horizontal with Underline effect</h2>
    <div class="nav2">
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Products</a></li>
        <li> <button>Login</button></li>
    </ul>
   
    </div>
    </div>
    <div class="navbar-container">
    <h2>Variaton 3 : Horizontal with Underline effect</h2>
    <div class="nav3">
    <ul>
        <li><a href="#">Home</a></li>
        <li><div class="dropdown">
            <a href="#">About</a>
            <div class="dropdown-content">
        <a href="#">Our Story</a> 
        <a href="#">Team</a> 
        <a href="#">Contact</a> 
            </div>
        </div></li>
        
        <li><a href="#">Products</a></li>
        <li> <button>Login</button></li>
    </ul>
    </div>
</div>
</body>
</html>
